# EC2 minimal — Python FastAPI only (1 container, port 80)
# Set BACKEND_IMAGE to a pre-built registry image for fast deploy (CI/CD).
services:
  backend:
    image: ${BACKEND_IMAGE:-ytv-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.ec2
    container_name: ytv-backend
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      ENV_FILE_PATH: /app/.env
      DB_ENGINE: sqlite
      SQLITE_PATH: /app/data/app.db
      REDIS_HOST: disabled
    volumes:
      - ./.env:/app/.env:ro
      - app_data:/app/data

volumes:
  app_data:
