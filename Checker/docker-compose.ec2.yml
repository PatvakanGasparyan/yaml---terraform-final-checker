# Ultra-light EC2 stack — backend + frontend + nginx (port 80)
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.ec2
    image: ytv-backend:latest
    container_name: ytv-backend
    restart: unless-stopped
    environment:
      ENV_FILE_PATH: /app/.env
      DB_ENGINE: sqlite
      SQLITE_PATH: /app/data/app.db
      REDIS_HOST: disabled
    volumes:
      - ./.env:/app/.env:ro
      - app_data:/app/data
    expose:
      - "8000"
    networks:
      - ytv-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: ytv-frontend:latest
    container_name: ytv-frontend
    restart: unless-stopped
    environment:
      ENV_FILE_PATH: /app/.env
      API_INTERNAL_URL: http://backend:8000
    volumes:
      - ./.env:/app/.env:ro
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - ytv-network

  nginx:
    image: nginx:alpine
    container_name: ytv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ytv-network

volumes:
  app_data:

networks:
  ytv-network:
    driver: bridge
