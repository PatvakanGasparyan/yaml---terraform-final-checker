stages:
  - lint
  - test
  - deploy

variables:
  PYTHON_VERSION: "3.12"

lint-backend:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install black ruff bandit
    - cd Checker/backend && ruff check app/ --config pyproject.toml

test-backend:
  stage: test
  image: python:3.12-slim
  script:
    - cd Checker && cp .env.example .env
    - pip install -r Checker/backend/requirements-dev.txt
    - cd Checker/backend && pytest tests/ -v --cov-fail-under=0

deploy:
  stage: deploy
  script:
    - echo "Deploy via GitHub Actions (.github/workflows/ci-cd.yml)"
  only:
    - main
    - master
