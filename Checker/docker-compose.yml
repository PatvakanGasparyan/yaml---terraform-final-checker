# Docker Compose - Development & Default
services:
  mysql:
    image: mysql:8.0
    container_name: ytv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: yaml_terraform_validator
      MYSQL_USER: validator
      MYSQL_PASSWORD: validator_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/mysql-schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ytv-network

  redis:
    image: redis:7-alpine
    container_name: ytv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ytv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytv-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      DEBUG: "true"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: validator
      MYSQL_PASSWORD: validator_secret
      MYSQL_DATABASE: yaml_terraform_validator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000,http://localhost,http://localhost:80
      FRONTEND_URL: http://localhost:3000
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_ENDPOINT: http://otel-collector:4317
      AI_PROVIDER: openai
      OPENAI_MODEL: gpt-4o-mini
      AI_TEMPERATURE: "0.2"
      AI_MAX_TOKENS: "8192"
      AI_TOP_P: "0.95"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backup_data:/backups
    networks:
      - ytv-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytv-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: validator
      MYSQL_PASSWORD: validator_secret
      MYSQL_DATABASE: yaml_terraform_validator
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backup_data:/backups
    networks:
      - ytv-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytv-scheduler
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    environment:
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - ytv-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ytv-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_APP_NAME: YAML & Terraform AI Validator
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ytv-network

  nginx:
    image: nginx:alpine
    container_name: ytv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ytv-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ytv-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ytv-network

  grafana:
    image: grafana/grafana:latest
    container_name: ytv-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ytv-network

  loki:
    image: grafana/loki:latest
    container_name: ytv-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - ytv-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ytv-otel
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - ytv-network

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  backup_data:

networks:
  ytv-network:
    driver: bridge
