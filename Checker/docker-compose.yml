# Docker Compose - Development & Default
# All application config lives in .env (fetched from S3 on EC2 via scripts/ec2-deploy.sh)
services:
  mysql:
    image: mysql:8.0
    container_name: ytv-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yaml_terraform_validator}
      MYSQL_USER: ${MYSQL_USER:-validator}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-validator_secret}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/mysql-schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ytv-network

  redis:
    image: redis:7-alpine
    container_name: ytv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ytv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytv-backend
    restart: unless-stopped
    environment:
      ENV_FILE_PATH: /app/.env
      ENV_S3_BUCKET: ${ENV_S3_BUCKET:-}
      ENV_S3_KEY: ${ENV_S3_KEY:-.env}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app
      - backup_data:/backups
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ytv-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytv-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      ENV_FILE_PATH: /app/.env
      ENV_S3_BUCKET: ${ENV_S3_BUCKET:-}
      ENV_S3_KEY: ${ENV_S3_KEY:-.env}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app
      - backup_data:/backups
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ytv-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ytv-scheduler
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    environment:
      ENV_FILE_PATH: /app/.env
      ENV_S3_BUCKET: ${ENV_S3_BUCKET:-}
      ENV_S3_KEY: ${ENV_S3_KEY:-.env}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      - redis
    networks:
      - ytv-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:8000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ytv-frontend
    restart: unless-stopped
    environment:
      ENV_FILE_PATH: /app/.env
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ytv-network

  nginx:
    image: nginx:alpine
    container_name: ytv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ytv-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ytv-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ytv-network

  grafana:
    image: grafana/grafana:latest
    container_name: ytv-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ytv-network

  loki:
    image: grafana/loki:latest
    container_name: ytv-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - ytv-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ytv-otel
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - ytv-network

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  backup_data:

networks:
  ytv-network:
    driver: bridge
