# Docker Compose — minimal stack (3 containers by default)
# Optional: docker compose --profile worker up -d   (celery + beat)
# Optional: docker compose --profile proxy up -d    (nginx on :80)
services:
  mysql:
    image: mysql:8.0-bookworm
    container_name: ytv-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yaml_terraform_validator}
      MYSQL_USER: ${MYSQL_USER:-validator}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-validator_secret}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/mysql-schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ytv-network

  redis:
    image: redis:7-alpine
    container_name: ytv-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ytv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ytv-backend:latest
    container_name: ytv-backend
    restart: unless-stopped
    environment:
      ENV_FILE_PATH: /app/.env
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ytv-network

  worker:
    profiles: ["worker"]
    image: ytv-backend:latest
    container_name: ytv-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    environment:
      ENV_FILE_PATH: /app/.env
    volumes:
      - ./.env:/app/.env:ro
      - backup_data:/backups
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ytv-network

  scheduler:
    profiles: ["worker"]
    image: ytv-backend:latest
    container_name: ytv-scheduler
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    environment:
      ENV_FILE_PATH: /app/.env
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      - redis
    networks:
      - ytv-network

  nginx:
    profiles: ["proxy"]
    image: nginx:alpine
    container_name: ytv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - ytv-network

volumes:
  mysql_data:
  backup_data:

networks:
  ytv-network:
    driver: bridge
