# Production Docker Compose overrides
services:
  backend:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G

  frontend:
    deploy:
      replicas: 2

  worker:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1"
          memory: 1G

  mysql:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  nginx:
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
