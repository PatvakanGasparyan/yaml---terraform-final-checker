# Production Docker Compose overrides
services:
  backend:
    environment:
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.yaml-validator.local}
    deploy:
      replicas: 2

  worker:
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1"
          memory: 1G

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-validator_secret}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  nginx:
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
