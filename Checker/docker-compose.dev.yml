# Development overrides - hot reload enabled
services:
  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: deps
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://backend:8000

  worker:
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=debug", "--concurrency=2"]
    volumes:
      - ./backend:/app

  prometheus:
    profiles: ["monitoring"]

  grafana:
    profiles: ["monitoring"]

  loki:
    profiles: ["monitoring"]

  otel-collector:
    profiles: ["monitoring"]
