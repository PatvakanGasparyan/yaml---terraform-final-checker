# Development overrides - hot reload enabled
services:
  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app

  worker:
    profiles: ["worker"]
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=debug", "--concurrency=1"]
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app

  redis:
    command: redis-server
