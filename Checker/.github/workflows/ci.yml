name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install black ruff mypy bandit
      - run: cd backend && black --check app/
      - run: cd backend && ruff check app/
      - run: cd backend && bandit -r app/ -ll

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: yaml_terraform_validator
          MYSQL_USER: validator
          MYSQL_PASSWORD: validator_secret
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r backend/requirements.txt
      - run: |
          cp .env.example backend/.env
          sed -i 's/MYSQL_HOST=mysql/MYSQL_HOST=127.0.0.1/' backend/.env
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' backend/.env
      - run: cd backend && pytest tests/ -v --cov=app --cov-report=xml

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - run: cd frontend && npm run lint || true

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: cp .env.example .env
      - run: docker compose build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit semgrep
      - run: bandit -r backend/app/ -f json -o bandit-report.json || true
      - run: semgrep --config=auto backend/ --json || true

  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: |
          cd infrastructure/kubernetes
          terraform init -backend=false 2>/dev/null || echo "No terraform configs to validate"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy to production environment"
