name: Full Deploy to EC2 (production stable)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            echo "=== UPDATE SYSTEM ==="
            sudo apt-get update -y
            sudo apt-get install -y git curl unzip

            echo "=== INSTALL DOCKER ==="
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            sudo systemctl enable docker
            sudo systemctl start docker

            echo "=== INSTALL DOCKER COMPOSE ==="
            if ! docker compose version &> /dev/null; then
              sudo apt-get install -y docker-compose-plugin
            fi

            echo "=== INSTALL AWS CLI ==="
            if ! command -v aws &> /dev/null; then
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -o awscliv2.zip
              sudo ./aws/install
            fi

            echo "=== SET APP DIR ==="
            APP_DIR=/home/ubuntu/yaml-validator
            mkdir -p $APP_DIR

            echo "=== CLONE OR UPDATE REPO ==="
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/PatvakanGasparyan/yaml---terraform-final-checker.git $APP_DIR
            fi

            cd $APP_DIR

            echo "=== SYNC LATEST CODE ==="
            git fetch origin

            BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
            echo "Detected branch: $BRANCH"

            git checkout $BRANCH || git checkout -b $BRANCH origin/$BRANCH
            git reset --hard origin/$BRANCH

            echo "=== AWS CONFIG ==="
            export AWS_ACCESS_KEY_ID=${{ secrets.IAM_ACCESS_KEY }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.IAM_SECRET_KEY }}
            export AWS_DEFAULT_REGION=eu-north-1

            echo "=== DOWNLOAD .ENV FROM S3 ==="
            aws s3 cp s3://validator.bucket/.env .env

            echo "=== LOCATE COMPOSE FILE ==="

            COMPOSE_FILE=$(find . -maxdepth 3 -type f \( -name "docker-compose.yml" -o -name "compose.yml" -o -name "docker-compose.yaml" \) | head -n 1)
            
            if [ -z "$COMPOSE_FILE" ]; then
              echo "ERROR: docker-compose file not found in repo"
              exit 1
            fi
            
            echo "Using compose file: $COMPOSE_FILE"
            
            docker compose -f $COMPOSE_FILE down || true
            docker compose -f $COMPOSE_FILE up -d --build

            echo "=== DEPLOY DONE ==="
