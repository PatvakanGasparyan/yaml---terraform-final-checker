name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}"
          test -n "${{ secrets.EC2_USER }}"
          test -n "${{ secrets.EC2_SSH_KEY }}"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 40m
          script: |
            cd /home/ubuntu/yaml-validator || exit 1

            git fetch origin
            git reset --hard origin/main

            cd Checker

            docker compose down --remove-orphans
            docker compose build
            docker compose up -d

            docker image prune -af
