# Python API — CI/CD deploy to EC2
#
# Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST, EC2_USER, EC2_SSH_KEY, IAM_ACCESS_KEY, IAM_SECRET_KEY
# Optional: EC2_PORT, AWS_REGION, ENV_S3_BUCKET, ENV_S3_KEY

name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  APP_DIR: /home/ubuntu/yaml-validator
  COMPOSE_FILE: docker-compose.ec2.yml

jobs:
  test:
    name: Python lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Checker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Checker/backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Prepare .env
        run: cp .env.example .env

      - name: Ruff lint
        run: ruff check backend/app/ --config backend/pyproject.toml

      - name: Pytest
        run: pytest backend/tests/ -v --tb=short --cov-fail-under=0

  deploy:
    name: Deploy to EC2
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    concurrency:
      group: ec2-deploy-production
      cancel-in-progress: false

    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || { echo "::error::Missing EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "::error::Missing EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_SSH_KEY }}" || { echo "::error::Missing EC2_SSH_KEY"; exit 1; }
          test -n "${{ secrets.IAM_ACCESS_KEY }}" || { echo "::error::Missing IAM_ACCESS_KEY"; exit 1; }
          test -n "${{ secrets.IAM_SECRET_KEY }}" || { echo "::error::Missing IAM_SECRET_KEY"; exit 1; }

      - name: Check SSH reachable
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          PORT="${EC2_PORT:-22}"
          timeout 20 bash -c "echo > /dev/tcp/${EC2_HOST}/${PORT}" \
            || { echo "::error::Cannot reach ${EC2_HOST}:${PORT}"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 120s
          command_timeout: 30m
          envs: APP_DIR,COMPOSE_FILE
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/${{ github.repository }}.git"
            COMPOSE_DIR="$APP_DIR/Checker"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            AWS_REGION="${AWS_REGION:-eu-north-1}"
            ENV_S3_BUCKET="${{ secrets.ENV_S3_BUCKET }}"
            ENV_S3_BUCKET="${ENV_S3_BUCKET:-validator.bucket}"
            ENV_S3_KEY="${{ secrets.ENV_S3_KEY }}"
            ENV_S3_KEY="${ENV_S3_KEY:-.env}"
            EC2_HOST="${{ secrets.EC2_HOST }}"

            sudo apt-get update -y
            sudo apt-get install -y git curl unzip

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sh
            fi
            sudo systemctl enable docker
            sudo systemctl start docker

            if ! docker compose version >/dev/null 2>&1; then
              sudo apt-get install -y docker-compose-plugin
            fi

            if ! command -v aws >/dev/null 2>&1; then
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
              unzip -o /tmp/awscliv2.zip -d /tmp
              sudo /tmp/aws/install
              rm -rf /tmp/aws /tmp/awscliv2.zip
            fi

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            cd "$COMPOSE_DIR"

            sudo docker compose -f "$COMPOSE_FILE" down --remove-orphans 2>/dev/null || true
            sudo docker builder prune -af 2>/dev/null || true
            sudo docker image prune -af 2>/dev/null || true

            export AWS_ACCESS_KEY_ID="${{ secrets.IAM_ACCESS_KEY }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.IAM_SECRET_KEY }}"
            export AWS_DEFAULT_REGION="$AWS_REGION"

            aws s3 cp "s3://${ENV_S3_BUCKET}/${ENV_S3_KEY}" .env
            chmod 600 .env

            sed -i '/^DB_ENGINE=/d; /^SQLITE_PATH=/d; /^REDIS_HOST=/d; /^CORS_ORIGINS=/d; /^PUBLIC_HOST=/d' .env
            echo "DB_ENGINE=sqlite" >> .env
            echo "SQLITE_PATH=/app/data/app.db" >> .env
            echo "REDIS_HOST=disabled" >> .env
            if [ -n "$EC2_HOST" ]; then
              echo "PUBLIC_HOST=$EC2_HOST" >> .env
              echo "CORS_ORIGINS=http://$EC2_HOST,http://$EC2_HOST:80" >> .env
            fi

            sudo docker compose -f "$COMPOSE_FILE" build backend
            sudo docker compose -f "$COMPOSE_FILE" up -d --no-build

            for i in $(seq 1 24); do
              if curl -fsS http://127.0.0.1/health >/dev/null \
                && curl -fsS http://127.0.0.1/docs >/dev/null; then
                echo "API live: http://${EC2_HOST}/docs"
                exit 0
              fi
              sleep 5
            done

            echo "ERROR: API did not become healthy"
            sudo docker compose -f "$COMPOSE_FILE" ps
            sudo docker compose -f "$COMPOSE_FILE" logs --tail=60
            exit 1
