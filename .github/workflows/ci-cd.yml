# Fast CI/CD — test on GHA, build with layer cache, deploy pre-built image to EC2
#
# Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY, IAM_ACCESS_KEY, IAM_SECRET_KEY
# Optional: EC2_PORT, AWS_REGION, ENV_S3_BUCKET, ENV_S3_KEY, GHCR_PULL_TOKEN

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  APP_DIR: /home/ubuntu/yaml-validator
  COMPOSE_FILE: docker-compose.ec2.yml
  REGISTRY: ghcr.io
  IMAGE_NAME: ytv-backend

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Checker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Checker/backend/requirements-dev.txt

      - name: Install & lint
        run: |
          pip install -r backend/requirements-dev.txt
          cp .env.example .env
          ruff check backend/app/ --config backend/pyproject.toml

      - name: Pytest
        working-directory: Checker/backend
        run: pytest tests/ -q --tb=line --no-cov

  build:
    name: Build image
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set GHCR image repository (lowercase)
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_REPO=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Checker/backend
          file: Checker/backend/Dockerfile.ec2
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: ec2-deploy-production
      cancel-in-progress: false

    env:
      BACKEND_IMAGE: ${{ env.IMAGE_REPO }}:${{ github.sha }}

    steps:
      - name: Set GHCR image repository (lowercase)
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_REPO=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Validate secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || { echo "::error::Missing EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "::error::Missing EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_SSH_KEY }}" || { echo "::error::Missing EC2_SSH_KEY"; exit 1; }
          test -n "${{ secrets.IAM_ACCESS_KEY }}" || { echo "::error::Missing IAM_ACCESS_KEY"; exit 1; }
          test -n "${{ secrets.IAM_SECRET_KEY }}" || { echo "::error::Missing IAM_SECRET_KEY"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 60s
          command_timeout: 10m
          envs: APP_DIR,COMPOSE_FILE,BACKEND_IMAGE
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/${{ github.repository }}.git"
            COMPOSE_DIR="$APP_DIR/Checker"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            AWS_REGION="${AWS_REGION:-eu-north-1}"
            ENV_S3_BUCKET="${{ secrets.ENV_S3_BUCKET }}"
            ENV_S3_BUCKET="${ENV_S3_BUCKET:-validator.bucket}"
            ENV_S3_KEY="${{ secrets.ENV_S3_KEY }}"
            ENV_S3_KEY="${ENV_S3_KEY:-.env}"
            EC2_HOST="${{ secrets.EC2_HOST }}"
            IMAGE="${BACKEND_IMAGE,,}"

            command -v git >/dev/null || sudo apt-get update -y && sudo apt-get install -y git
            command -v aws >/dev/null || { echo "::error::aws CLI not found on EC2 — run bootstrap once"; exit 1; }
            command -v docker >/dev/null || { echo "::error::Docker not found on EC2 — run bootstrap once"; exit 1; }

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --depth 1 "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --depth 1 origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            cd "$COMPOSE_DIR"

            export AWS_ACCESS_KEY_ID="${{ secrets.IAM_ACCESS_KEY }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.IAM_SECRET_KEY }}"
            export AWS_DEFAULT_REGION="$AWS_REGION"

            aws s3 cp "s3://${ENV_S3_BUCKET}/${ENV_S3_KEY}" .env
            chmod 600 .env

            sed -i '/^DB_ENGINE=/d; /^SQLITE_PATH=/d; /^REDIS_HOST=/d; /^CORS_ORIGINS=/d; /^PUBLIC_HOST=/d' .env
            {
              echo "DB_ENGINE=sqlite"
              echo "SQLITE_PATH=/app/data/app.db"
              echo "REDIS_HOST=disabled"
              [ -n "$EC2_HOST" ] && echo "PUBLIC_HOST=$EC2_HOST"
              [ -n "$EC2_HOST" ] && echo "CORS_ORIGINS=http://$EC2_HOST,http://$EC2_HOST:80"
            } >> .env

            if [ -n "${{ secrets.GHCR_PULL_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_PULL_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi

            export BACKEND_IMAGE="$IMAGE"
            sudo docker pull "$BACKEND_IMAGE"
            sudo docker compose -f "$COMPOSE_FILE" up -d --no-build --pull never

            for i in $(seq 1 10); do
              curl -fsS http://127.0.0.1/health >/dev/null && { echo "OK http://${EC2_HOST}/docs"; exit 0; }
              sleep 3
            done

            sudo docker compose -f "$COMPOSE_FILE" ps
            sudo docker compose -f "$COMPOSE_FILE" logs --tail=40
            exit 1
