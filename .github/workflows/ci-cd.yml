# Fast CI/CD — test, build backend + frontend (GHA cache), deploy to EC2
#
# Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY, IAM_ACCESS_KEY, IAM_SECRET_KEY
# Optional: EC2_PORT, AWS_REGION, ENV_S3_BUCKET, ENV_S3_KEY, GHCR_PULL_TOKEN, FRONTEND_ORIGIN

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  APP_DIR: /home/ubuntu/yaml-validator
  COMPOSE_FILE: docker-compose.ec2.yml
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ytv-backend
  FRONTEND_IMAGE_NAME: ytv-frontend

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Checker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Checker/backend/requirements-dev.txt

      - name: Install & lint
        run: |
          pip install -r backend/requirements-dev.txt
          cp .env.example .env
          ruff check backend/app/ --config backend/pyproject.toml

      - name: Pytest
        working-directory: Checker/backend
        run: pytest tests/ -q --tb=line --no-cov

  build:
    name: Build images
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set GHCR image repositories (lowercase)
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_REPO=${{ env.REGISTRY }}/${OWNER}/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "FRONTEND_REPO=${{ env.REGISTRY }}/${OWNER}/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: Checker/backend
          file: Checker/backend/Dockerfile.ec2
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: Checker/frontend
          file: Checker/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          build-args: |
            API_INTERNAL_URL=http://backend:8000
            NEXT_PUBLIC_API_URL=http://localhost
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    concurrency:
      group: ec2-deploy-production
      cancel-in-progress: false

    steps:
      - name: Set GHCR image repositories (lowercase)
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${OWNER}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/${OWNER}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Validate secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || { echo "::error::Missing EC2_HOST"; exit 1; }
          test -n "${{ secrets.EC2_USER }}" || { echo "::error::Missing EC2_USER"; exit 1; }
          test -n "${{ secrets.EC2_SSH_KEY }}" || { echo "::error::Missing EC2_SSH_KEY"; exit 1; }
          test -n "${{ secrets.IAM_ACCESS_KEY }}" || { echo "::error::Missing IAM_ACCESS_KEY"; exit 1; }
          test -n "${{ secrets.IAM_SECRET_KEY }}" || { echo "::error::Missing IAM_SECRET_KEY"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 60s
          command_timeout: 15m
          envs: APP_DIR,COMPOSE_FILE,BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/${{ github.repository }}.git"
            COMPOSE_DIR="$APP_DIR/Checker"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            AWS_REGION="${AWS_REGION:-eu-north-1}"
            ENV_S3_BUCKET="${{ secrets.ENV_S3_BUCKET }}"
            ENV_S3_BUCKET="${ENV_S3_BUCKET:-validator.bucket}"
            ENV_S3_KEY="${{ secrets.ENV_S3_KEY }}"
            ENV_S3_KEY="${ENV_S3_KEY:-.env}"
            EC2_HOST="${{ secrets.EC2_HOST }}"
            BACKEND_IMG="${BACKEND_IMAGE,,}"
            FRONTEND_IMG="${FRONTEND_IMAGE,,}"

            command -v git >/dev/null || sudo apt-get update -y && sudo apt-get install -y git
            command -v aws >/dev/null || { echo "::error::aws CLI not found on EC2 — run bootstrap once"; exit 1; }
            command -v docker >/dev/null || { echo "::error::Docker not found on EC2 — run bootstrap once"; exit 1; }

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --depth 1 "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --depth 1 origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"

            cd "$COMPOSE_DIR"

            export AWS_ACCESS_KEY_ID="${{ secrets.IAM_ACCESS_KEY }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.IAM_SECRET_KEY }}"
            export AWS_DEFAULT_REGION="$AWS_REGION"

            aws s3 cp "s3://${ENV_S3_BUCKET}/${ENV_S3_KEY}" .env
            chmod 600 .env

            sed -i '/^DB_ENGINE=/d; /^SQLITE_PATH=/d; /^REDIS_HOST=/d; /^OTEL_ENABLED=/d; /^CORS_ORIGINS=/d; /^PUBLIC_HOST=/d; /^FRONTEND_URL=/d; /^API_INTERNAL_URL=/d; /^NEXT_PUBLIC_API_URL=/d' .env
            {
              echo "DB_ENGINE=sqlite"
              echo "SQLITE_PATH=/app/data/app.db"
              echo "REDIS_HOST=disabled"
              echo "OTEL_ENABLED=false"
              echo "API_INTERNAL_URL=http://backend:8000"
              echo "NEXT_PUBLIC_API_URL=http://${EC2_HOST}"
              [ -n "$EC2_HOST" ] && echo "PUBLIC_HOST=$EC2_HOST"
              [ -n "$EC2_HOST" ] && echo "FRONTEND_URL=http://$EC2_HOST"
              [ -n "$EC2_HOST" ] && echo "CORS_ORIGINS=http://$EC2_HOST,http://$EC2_HOST:80,http://localhost:3000"
            } >> .env
            FRONTEND_ORIGIN="${{ secrets.FRONTEND_ORIGIN }}"
            if [ -n "$FRONTEND_ORIGIN" ]; then
              CORS_BASE="$(grep '^CORS_ORIGINS=' .env | tail -1 | cut -d= -f2-)"
              sed -i '/^CORS_ORIGINS=/d' .env
              echo "CORS_ORIGINS=${CORS_BASE},${FRONTEND_ORIGIN}" >> .env
            fi

            GHCR_TOKEN="${{ secrets.GHCR_PULL_TOKEN }}"
            if [ -z "$GHCR_TOKEN" ]; then
              GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            fi
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export BACKEND_IMAGE="$BACKEND_IMG"
            export FRONTEND_IMAGE="$FRONTEND_IMG"
            sudo docker pull "$BACKEND_IMAGE"
            sudo docker pull "$FRONTEND_IMAGE"
            sudo docker compose -f "$COMPOSE_FILE" up -d --no-build --pull never

            for i in $(seq 1 15); do
              if curl -fsS http://127.0.0.1/health >/dev/null && curl -fsS http://127.0.0.1/ >/dev/null; then
                echo "Stack OK on server."
                echo "Website:      http://${EC2_HOST}/"
                echo "YAML editor:  http://${EC2_HOST}/yaml-editor"
                echo "Swagger API:  http://${EC2_HOST}/docs"
                echo "Health:       http://${EC2_HOST}/health"
                echo "If browser cannot connect → AWS Security Group must allow inbound TCP 80."
                exit 0
              fi
              sleep 4
            done

            sudo docker compose -f "$COMPOSE_FILE" ps
            sudo docker compose -f "$COMPOSE_FILE" logs --tail=60
            exit 1
